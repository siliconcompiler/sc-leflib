[build-system]
requires = [
    "scikit-build-core > 0.12",
    "setuptools_scm[toml] > 8",
    "cython",
    "cython-cmake"
]
build-backend = "scikit_build_core.build"

[tool.setuptools_scm]
# Presence of this section activates setuptools_scm, even though it's empty

[project]
name = "sc-leflib"
description = "LEF parser for SiliconCompiler"
readme = "README.md"
requires-python = ">=3.9"
license = "Apache-2.0"
license-files = ["LICENSE"]
authors = [
    { name = "ZeroASIC", email = "gadfort@zeroasic.com" }
]
dynamic = ["version"]

[project.urls]
Documentation = "https://docs.siliconcompiler.com"
"Source Code" = "https://github.com/siliconcompiler/sc-leflib"
"Bug Tracker" = "https://github.com/siliconcompiler/sc-leflib/issues"
Forum = "https://github.com/siliconcompiler/sc-leflib/discussions"

[project.optional-dependencies]
test = [
    "pytest == 8.4.2",
    "pytest-timeout == 2.4.0",
    "flake8 == 7.3.0"
]

[tool.scikit-build]
cmake.minimum-version = "3.15"
cmake.build-type = "Release"
build-dir = "build/{wheel_tag}"
wheel.packages = ["sc_leflib"]
wheel.exclude = [
    "sc_leflib/*.pyx",
    "sc_leflib/*.pxd",
    "sc_leflib/CMakeLists.txt"
]
search.site-packages = true
metadata.version.provider = "scikit_build_core.metadata.setuptools_scm"
editable.mode = "inplace"

[[tool.scikit-build.generate]]
path = "sc_leflib/_version.py"
template = '''
# This file is automatically generated by scikit-build.
# Do not edit it directly.

__version__ = "${version}"
'''

[tool.pytest.ini_options]
testpaths = [
    "tests"
]
timeout = "120"
addopts = [
    "--import-mode=importlib",
]
